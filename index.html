<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
<title>Facture FNE</title>

<style>

body{
    font-family: Montserrat;
    background:#eeeded;
    margin-top:7px ;
    margin-bottom: 0px;
    padding-bottom: 0px;
    padding-top: 20px;
}

.container{
    max-width:705px;
    margin:auto;
    background:#ffffff;
    border-radius:15px;
    padding:35px 30px;
    box-shadow:0 2px 10px rgba(149, 149, 149, 0.032);
}

.logo{
    text-align:center;
}

.logo img{
    width:180px;
}

.title{
    text-align:center;
    font-weight:bold;
    font-size:24.5px;
    margin:20px 0 40px 0;
    color:#143e6e;
}

.facture{
    display:grid;
    grid-template-columns: 1.3fr 2fr;
    row-gap:20px;
    column-gap:20px;
    font-size:15.9px;
}

.label{
    font-weight:bold;
}

.value{
    color:#000000;
}

.button{
    text-align:center;
    margin-top:40px;
}

button{
    background:#069bc8;
    color:rgb(255, 255, 255);
    border:none;
    padding:11px 25px;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#166d89;
}

/* Responsive Smartphone */

@media (max-width:600px){

.container{
padding:25px 20px;
max-width:300px;
}

.title{
font-size:25px;
}

.facture{
grid-template-columns:1fr;
}

.label{
margin-top:5px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="logo.png">
</div>

<div class="title">
FACTURE CERTIFIÉE PAR LA PLATEFORME FNE
</div>

<div class="facture">

<div class="label">FOURNISSEUR :</div>
<div class="value">HOTEL VEI - 0805563A</div>

<div class="label">CLIENT :</div>
<div class="value">Kouassi Jean Luc</div>

<div class="label">NUMÉRO DE FACTURE :</div>
<div class="value">0805563A26000000189</div>

<div class="label">DATE DE FACTURATION :</div>
<div class="value">20/06/2026</div>

<div class="label">VÉRIFICATION D'IDENTITÉ :</div>
<div class="value">2A61BEDB-8678-79MA-45O2-GC679U5CE606</div>

<div class="label">MONTANT TTC :</div>
<div class="value">78 000 CFA</div>

</div>

<div class="button">
<button onclick="telechargerPDF()">Exportateur</button>
</div>

</div>

<script>

function telechargerPDF(){

    const link = document.createElement("a");

    link.href = "0805563A26000000189_2026-06-20.pdf"; 
    link.download = "0805563A26000000189_2026-06-20.pdf";

    link.click();

}

</script>

</body>
</html>
